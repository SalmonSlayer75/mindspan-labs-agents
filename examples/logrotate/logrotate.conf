# Logrotate config for Claude bot logs
#
# Setup:
#   1. Copy this to ~/.claude/logrotate.conf (or /etc/logrotate.d/claude-bots if root)
#   2. Add to crontab:
#      0 4 * * 0 /usr/sbin/logrotate --state ~/.claude/logrotate.state ~/.claude/logrotate.conf
#
# This rotates watchdog, cron task, and boot logs weekly, keeping 4 weeks of history.

/home/yourusername/.claude/channels/*.log {
    weekly
    rotate 4
    compress
    missingok
    notifempty
    copytruncate
    size 10M
}
